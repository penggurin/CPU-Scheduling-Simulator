</style>

<h1>CPU Scheduling Simulator</h1>

<div class="glass" style="padding: 20px">
  <div class="top-row">
    <div>
      <label class="lbl">Algorithm</label>
      <select id="algo">
        <option value="fcfs">First Come First Serve (FCFS)</option>
        <option value="sjf">Shortest Job First (SJF)</option>
        <option value="npp">Non-Preemptive Priority (NPP)</option>
        <option value="srtf">Shortest Remaining Time First (SRTF)</option>
      </select>
    </div>
    <div>
      <label class="lbl">Number of Jobs</label>
      <input
        type="number"
        id="numJobs"
        min="1"
        max="10"
        value="5"
        style="width: 100%"
      />
    </div>
  </div>
  <div style="overflow-x: auto">
    <table class="job-table">
      <thead>
        <tr>
          <th>Job</th>
          <th>Arrival Time</th>
          <th>Burst Time</th>
          <th>Priority</th>
        </tr>
      </thead>
      <tbody id="tBody"></tbody>
    </table>
  </div>
  <div class="btn-row">
    <button class="btn btn-run" onclick="runScheduler()">
      &#9654; Calculate
    </button>
    <button class="btn btn-reset" onclick="resetAll()">&#8635; Reset</button>
  </div>
</div>

<div id="results">
  <!-- Timeline -->
  <div class="glass" style="padding: 16px 20px">
    <div class="sec-title">Timeline</div>
    <div style="overflow-x: auto; padding: 0 8px" id="tlContainer"></div>
  </div>

  <!-- Gantt -->
  <div class="glass" style="padding: 16px 20px">
    <div class="sec-title">Gantt Chart</div>
    <div
      style="
        display: flex;
        justify-content: center;
        overflow-x: auto;
        padding-bottom: 4px;
      "
    >
      <div id="ganttContainer">
        <div id="ganttWrap"></div>
      </div>
    </div>
    <div
      style="
        font-size: 10px;
        color: rgba(255, 255, 255, 0.22);
        margin-top: 8px;
        font-style: italic;
        text-align: center;
      "
    ></div>
  </div>

  <!-- Stats -->
  <div class="results-grid">
    <div class="glass calc-box">
      <div class="sec-title">Turn-around Time</div>
      <div id="tatRows"></div>
      <div class="calc-avg" id="tatAvg"></div>
    </div>
    <div class="glass calc-box">
      <div class="sec-title">Waiting Time</div>
      <div id="wtRows"></div>
      <div class="calc-avg" id="wtAvg"></div>
    </div>
    <div class="glass cpu-box">
      <div class="sec-title">CPU Utilization</div>
      <div class="cpu-inner">
        <div class="donut-wrap">
          <svg
            width="0"
            height="0"
            viewBox="0 0 110 110"
            style="transform: rotate(-90deg)"
          >
            <circle
              cx="55"
              cy="55"
              r="44"
              fill="none"
              stroke="rgba(255,255,255,0.07)"
              stroke-width="7"
            />
            <circle
              id="donutArc"
              cx="55"
              cy="55"
              r="44"
              fill="none"
              stroke="url(#dg)"
              stroke-width="7"
              stroke-linecap="round"
              stroke-dasharray="276.5"
              stroke-dashoffset="276.5"
            />
          </svg>
          <div class="donut-center">
            <div class="donut-pct" id="donutPct">0%</div>
            <div class="donut-sub">CPU UTILIZATION</div>
          </div>
        </div>
        <div class="cpu-frac" id="cpuFormula"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const COLORS = [
    { bar: "rgba(167,139,250,0.75)", text: "#ede9fe" }, // violet
    { bar: "rgba(129,140,248,0.75)", text: "#e0e7ff" }, // indigo
    { bar: "rgba(96,165,250,0.75)", text: "#dbeafe" }, // blue
    { bar: "rgba(192,132,252,0.75)", text: "#f3e8ff" }, // purple
    { bar: "rgba(99,102,241,0.75)", text: "#e0e7ff" }, // indigo-600
    { bar: "rgba(139,92,246,0.75)", text: "#ede9fe" }, // violet-600
    { bar: "rgba(147,197,253,0.75)", text: "#dbeafe" }, // blue-300
    { bar: "rgba(216,180,254,0.75)", text: "#f3e8ff" }, // purple-300
  ];

  let jobs = [
    { id: 1, at: 0, bt: 10, pr: 3 },
    { id: 2, at: 2, bt: 1, pr: 1 },
    { id: 3, at: 4, bt: 2, pr: 3 },
    { id: 4, at: 6, bt: 1, pr: 4 },
    { id: 5, at: 8, bt: 5, pr: 2 },
  ];
  function scaleGantt() {
    const container = document.getElementById("ganttContainer");
    const content = document.getElementById("ganttWrap");

    const scale = container.offsetWidth / content.scrollWidth;
    content.style.transform = `scale(${scale})`;
  }

  window.addEventListener("resize", scaleGantt);
  window.addEventListener("load", scaleGantt);
  function buildTable() {
    const n = Math.max(
      1,
      parseInt(document.getElementById("numJobs").value) || 1,
    );
    while (jobs.length < n)
      jobs.push({ id: jobs.length + 1, at: 0, bt: 1, pr: 1 });
    jobs = jobs.slice(0, n);
    const tb = document.getElementById("tBody");
    tb.innerHTML = "";
    jobs.forEach((j, i) => {
      tb.innerHTML += `<tr>
      <td>P${j.id}</td>
      <td><input type="number" min="0" value="${j.at}" onchange="jobs[${i}].at=+this.value" style="width:70px"></td>
      <td><input type="number" min="1" value="${j.bt}" onchange="jobs[${i}].bt=+this.value" style="width:70px"></td>
      <td><input type="number" min="1" value="${j.pr}" onchange="jobs[${i}].pr=+this.value" style="width:70px"></td>
    </tr>`;
    });
  }
  document.getElementById("numJobs").addEventListener("change", buildTable);
  buildTable();

  function avail(gantt, t) {
    const used = gantt.map((g) => g.id);
    return jobs
      .filter((x) => x.at <= t && !used.includes(x.id))
      .map((x) => x.id);
  }
  function merge(arr, chosen) {
    return [...new Set([...arr, chosen])].sort((a, b) => a - b);
  }

  function fcfs() {
    const sj = [...jobs].sort((a, b) => a.at - b.at);
    const g = [];
    let t = 0;
    sj.forEach((j) => {
      if (t < j.at) t = j.at;
      const av = avail(g, t);
      g.push({ id: j.id, s: t, e: t + j.bt, av: merge(av, j.id) });
      t += j.bt;
    });
    return g;
  }
  function sjf() {
    const rem = jobs.map((j) => ({ ...j, done: false }));
    const g = [];
    let t = 0,
      done = 0;
    while (done < jobs.length) {
      const av = rem.filter((j) => j.at <= t && !j.done);
      if (!av.length) {
        t++;
        continue;
      }
      const p = av.reduce((m, j) => (j.bt < m.bt ? j : m));
      const av2 = avail(g, t);
      g.push({ id: p.id, s: t, e: t + p.bt, av: merge(av2, p.id) });
      t += p.bt;
      p.done = true;
      done++;
    }
    return g;
  }
  function npp() {
    const rem = jobs.map((j) => ({ ...j, done: false }));
    const g = [];
    let t = 0,
      done = 0;
    while (done < jobs.length) {
      const av = rem.filter((j) => j.at <= t && !j.done);
      if (!av.length) {
        t++;
        continue;
      }
      const p = av.reduce((m, j) => (j.pr < m.pr ? j : m));
      const av2 = avail(g, t);
      g.push({ id: p.id, s: t, e: t + p.bt, av: merge(av2, p.id) });
      t += p.bt;
      p.done = true;
      done++;
    }
    return g;
  }
  function srtf() {
    const rem = jobs.map((j) => ({ ...j, left: j.bt, done: false }));
    const g = [];
    let t = 0,
      done = 0,
      lastId = -1,
      seg = 0;
    while (done < jobs.length) {
      const av = rem.filter((j) => j.at <= t && !j.done);
      if (!av.length) {
        t++;
        continue;
      }
      const p = av.reduce((m, j) => (j.left < m.left ? j : m));
      if (p.id !== lastId) {
        if (lastId !== -1) g.push({ id: lastId, s: seg, e: t, av: [] });
        seg = t;
        lastId = p.id;
      }
      p.left--;
      t++;
      if (p.left === 0) {
        p.done = true;
        done++;
        g.push({ id: p.id, s: seg, e: t, av: [] });
        lastId = -1;
      }
    }
    g.forEach((seg) => {
      const ub = g.filter((x) => x.e <= seg.s).map((x) => x.id);
      seg.av = [
        ...new Set([
          ...jobs
            .filter((j) => j.at <= seg.s && !ub.includes(j.id))
            .map((j) => j.id),
          seg.id,
        ]),
      ].sort((a, b) => a - b);
    });
    return g;
  }

  function renderTimeline() {
    const sorted = [...jobs].sort((a, b) => a.at - b.at);
    const times = [...new Set(sorted.map((j) => j.at))].sort((a, b) => a - b);
    const max = times[times.length - 1] || 1;
    const W = 600;

    let html = `<div style="position:relative;width:${W}px;height:56px;margin:0 auto">`;
    // horizontal line
    html += `<div style="position:absolute;top:24px;left:0;width:${W}px;height:2px;background:rgba(255,255,255,0.25)"></div>`;

    // for each job mark a tick + label
    sorted.forEach((j) => {
      const x = (j.at / max) * W;
      // vertical tick
      html += `<div style="position:absolute;left:${x}px;top:16px;width:2px;height:18px;background:rgba(255,255,255,0.4);transform:translateX(-1px)"></div>`;
      // job label above
      html += `<div style="position:absolute;left:${x}px;top:0;transform:translateX(-50%);font-size:12px;font-weight:700;color:#c4b5fd;font-family:'Oxanium',sans-serif">P${j.id}</div>`;
      // time label below
      html += `<div style="position:absolute;left:${x}px;top:38px;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,0.45);font-family:'IBM Plex Mono',monospace">${j.at}</div>`;
    });
    html += "</div>";
    document.getElementById("tlContainer").innerHTML = html;
  }

  function renderGantt(gantt) {
    const PX = 54;
    // burst row
    let b = '<div style="display:flex;justify-content:center">';
    gantt.forEach((g) => {
      const w = (g.e - g.s) * PX;
      b += `<div style="width:${w}px;flex-shrink:0;text-align:center;font-size:11px;color:rgba(255,255,255,0.35);font-family:'IBM Plex Mono',monospace">${g.e - g.s}</div>`;
    });
    b += "</div>";
    // bars
    let bars = '<div style="display:flex;justify-content:center">';
    gantt.forEach((g) => {
      const c = COLORS[(g.id - 1) % COLORS.length];
      const w = (g.e - g.s) * PX;
      bars += `<div style="width:${w}px;flex-shrink:0;height:50px;background:${c.bar};border:1px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:${c.text};font-family:'Oxanium',sans-serif">P${g.id}</div>`;
    });
    bars += "</div>";
    // time numbers
    let times =
      '<div style="display:flex;justify-content:center;margin-top:2px">';
    const seen = new Set();
    gantt.forEach((g, i) => {
      const w = (g.e - g.s) * PX;
      times += `<div style="width:${w}px;flex-shrink:0;font-size:11px;font-family:'IBM Plex Mono',monospace;color:rgba(255,255,255,0.5);position:relative">`;
      if (!seen.has(g.s)) {
        times += `<span style="position:absolute;left:0;transform:translateX(-50%)">${g.s}</span>`;
        seen.add(g.s);
      }
      if (i === gantt.length - 1) {
        times += `<span style="position:absolute;right:0;transform:translateX(50%)">${g.e}</span>`;
      }
      times += "</div>";
    });
    times += "</div>";
    // available jobs
    let av =
      '<div style="display:flex;justify-content:center;margin-top:10px">';
    gantt.forEach((g) => {
      const w = (g.e - g.s) * PX;
      av += `<div style="width:${w}px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:2px">`;
      (g.av || []).forEach((jid) => {
        const sel = jid === g.id;
        av += `<span style="font-size:10px;font-family:'IBM Plex Mono',monospace;${sel ? "text-decoration:line-through;color:rgba(255,255,255,0.22)" : "color:rgba(255,255,255,0.55)"}">P${jid}</span>`;
      });
      av += "</div>";
    });
    av += "</div>";
    document.getElementById("ganttWrap").innerHTML = b + bars + times + av;
  }

  function renderStats(gantt) {
    const fin = {};
    gantt.forEach((g) => (fin[g.id] = Math.max(fin[g.id] || 0, g.e)));
    const sorted = [...jobs].sort((a, b) => a.id - b.id);
    const tats = [],
      wts = [];
    let tH = "",
      wH = "";
    sorted.forEach((j) => {
      const f = fin[j.id] || 0,
        tat = f - j.at,
        wt = tat - j.bt;
      tats.push(tat);
      wts.push(wt);
      tH += `<div class="calc-row"><span class="calc-eq">tt${j.id}: ${f} − ${j.at}</span><span class="calc-val">= ${tat}</span></div>`;
      wH += `<div class="calc-row"><span class="calc-eq">wt${j.id}: ${tat} − ${j.bt}</span><span class="calc-val">= ${wt}</span></div>`;
    });
    const n = tats.length,
      sT = tats.reduce((a, b) => a + b, 0),
      sW = wts.reduce((a, b) => a + b, 0);
    document.getElementById("tatRows").innerHTML = tH;
    document.getElementById("tatAvg").innerHTML =
      `<div class="avg-f">ttave: (${tats.join("+")})/  ${n}</div><div class="avg-f">= ${sT} / ${n}</div><div class="avg-v">= ${(sT / n).toFixed(2)} ms</div>`;
    document.getElementById("wtRows").innerHTML = wH;
    document.getElementById("wtAvg").innerHTML =
      `<div class="avg-f">wtave: (${wts.join("+")})/  ${n}</div><div class="avg-f">= ${sW} / ${n}</div><div class="avg-v">= ${(sW / n).toFixed(2)} ms</div>`;

    const tb = jobs.reduce((a, j) => a + j.bt, 0),
      tt = gantt[gantt.length - 1].e,
      pct = (tb / tt) * 100;
    const circ = 2 * Math.PI * 44;
    document
      .getElementById("donutArc")
      .setAttribute("stroke-dashoffset", (circ * (1 - pct / 100)).toFixed(2));
    document.getElementById("donutPct").textContent = pct.toFixed(1) + "%";
    document.getElementById("cpuFormula").innerHTML =
      `<span class="frac-line"><span class="frac-n">${jobs.map((j) => j.bt).join("+")} = ${tb}</span><span class="frac-d">${tt}</span></span> × 100 = <span style="color:#a78bfa;font-weight:600">${pct.toFixed(1)}%</span>`;
  }

  function runScheduler() {
    document.querySelectorAll("#tBody tr").forEach((row, i) => {
      const inp = row.querySelectorAll("input");
      jobs[i].at = +inp[0].value || 0;
      jobs[i].bt = +inp[1].value || 1;
      jobs[i].pr = +inp[2].value || 1;
    });
    const algo = document.getElementById("algo").value;
    const gantt =
      algo === "fcfs"
        ? fcfs()
        : algo === "sjf"
          ? sjf()
          : algo === "npp"
            ? npp()
            : srtf();
    renderTimeline();
    renderGantt(gantt);
    renderStats(gantt);
    document.getElementById("results").style.display = "flex";
  }
  function resetAll() {
    document.getElementById("results").style.display = "none";
    document
      .getElementById("donutArc")
      .setAttribute("stroke-dashoffset", "276.5");
    document.getElementById("donutPct").textContent = "0%";
    document.getElementById("cpuFormula").innerHTML = "";
  }
</script>
