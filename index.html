<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CPU Scheduling Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .timeline-line {
        position: absolute;
        top: 50%;
        left: 0;
        right: 0;
        height: 2px;
        background-color: #6b7280; /* gray-500 */
        transform: translateY(-50%);
      }

      .timeline-tick {
        position: absolute;
        top: 50%;
        width: 2px;
        height: 10px;
        background-color: #6b7280;
        transform: translateY(-50%);
      }

      .timeline-label {
        position: absolute;
        top: 0;
        transform: translateX(-50%);
        font-size: 0.875rem;
      }
      /* Dots background pattern */
      .dots-bg-light {
        background-image: radial-gradient(
          circle,
          rgba(0, 0, 0, 0.1) 1px,
          transparent 1px
        );
        background-size: 20px 20px;
      }

      .dots-bg-dark {
        background-image: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.1) 1px,
          transparent 1px
        );
        background-size: 20px 20px;
      }

      /* Smooth transitions */
      * {
        transition:
          background-color 0.3s,
          color 0.3s,
          border-color 0.3s;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }

      .dark ::-webkit-scrollbar-thumb {
        background: #4b5563;
      }

      /* Hover effects */
      .gantt-bar {
        transition: transform 0.2s;
      }

      .gantt-bar:hover {
        transform: scale(1.05);
      }

      /* Input styling */
      input[type="number"]::-webkit-inner-spin-button,
      input[type="number"]::-webkit-outer-spin-button {
        opacity: 1;
      }
    </style>
  </head>
  <body
    class="min-h-screen transition-colors duration-300 bg-gradient-to-br from-purple-50 via-pink-50 to-blue-50"
  >
    <!-- Dots background -->
    <div
      id="dotsBackground"
      class="fixed inset-0 pointer-events-none opacity-30 dots-bg-light"
    ></div>

    <div class="relative z-10 container mx-auto px-4 py-8 max-w-7xl">
      <!-- Header -->
      <div class="flex items-center justify-between mb-8">
        <h1
          class="p-1 text-4xl font-bold text-center bg-gradient-to-r from-blue-900 via-teal-400 to-green-500 bg-clip-text text-transparent flex-1"
          id="mainTitle"
        >
          CPU Scheduling Simulator
        </h1>

        <button
          id="darkModeToggle"
          class="p-2 rounded-full border border-gray-300 bg-white hover:bg-gray-100 dark:bg-gray-100 dark:border-gray-600 dark:hover:bg-gray-600 ml-4"
        >
          <svg
            id="sunIcon"
            class="h-5 w-5 text-gray-800"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
            />
          </svg>
          <svg
            id="moonIcon"
            class="h-5 w-5 text-white hidden"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
            />
          </svg>
        </button>
      </div>

      <!-- Input Section -->
      <div
        class="p-6 mb-6 rounded-lg shadow-lg bg-white/80 backdrop-blur border border-gray-200"
        id="configCard"
      >
        <h2 class="text-2xl font-semibold mb-4 text-gray-800" id="configTitle">
          Configuration
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
          <div>
            <label
              class="block text-sm font-medium mb-2 text-gray-700"
              id="algoLabel"
            >
              Scheduling Algorithm
            </label>
            <select
              id="algorithm"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500"
            >
              <option value="fcfs">First Come First Serve (FCFS)</option>
              <option value="sjf">Shortest Job First (SJF)</option>
              <option value="npp">Non-Preemptive Priority (NPP)</option>
              <option value="srtf">Shortest Remaining Time First (SRTF)</option>
            </select>
          </div>

          <div>
            <label
              class="block text-sm font-medium mb-2 text-gray-700"
              id="numJobsLabel"
            >
              Number of Jobs
            </label>
            <input
              type="number"
              id="numJobs"
              min="1"
              max="10"
              value="3"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-purple-500"
            />
          </div>
        </div>

        <!-- Jobs Table -->
        <div class="overflow-x-auto mb-6">
          <table class="w-full">
            <thead>
              <tr class="border-b border-gray-200">
                <th class="py-2 px-4 text-left text-gray-700">Job ID</th>
                <th class="py-2 px-4 text-left text-gray-700">Arrival Time</th>
                <th class="py-2 px-4 text-left text-gray-700">Burst Time</th>
                <th class="py-2 px-4 text-left text-gray-700">Priority</th>
              </tr>
            </thead>
            <tbody id="jobsTableBody">
              <!-- Jobs will be inserted here by JavaScript -->
            </tbody>
          </table>
        </div>

        <div class="flex gap-4">
          <button
            id="runBtn"
            class="px-6 py-2 bg-green-500 hover:bg-purple-600 text-white rounded-md font-medium flex items-center gap-2"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
            Run Scheduler
          </button>
          <button
            id="resetBtn"
            class="px-6 py-2 border border-gray-300 hover:bg-gray-100 text-gray-700 rounded-md font-medium flex items-center gap-2"
          >
            <svg
              class="h-4 w-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
              />
            </svg>
            Reset
          </button>
        </div>
      </div>

      <!-- Results Section -->
      <div id="resultsSection" class="space-y-6 hidden">
        <!-- Gantt Chart -->
        <div
          class="p-6 rounded-lg shadow-lg bg-white/80 backdrop-blur border border-gray-200"
          id="timelineCard"
        >
          <h2 class="text-2xl font-semibold mb-4 text-gray-800">Timeline</h2>
          <div id="timelineContainer" class="w-full"></div>
        </div>
        <!-- Gantt Chart -->
        <div
          class="p-6 rounded-lg shadow-lg bg-white/80 backdrop-blur border border-gray-200"
          id="ganttCard"
        >
          <h2 class="text-2xl font-semibold mb-4 text-gray-800">Gantt Chart</h2>
          <div class="overflow-x-auto pb-4">
            <div class="min-w-max">
              <!-- Chart bars -->
              <div id="ganttBars" class="flex gap-0 mb-2">
                <!-- Gantt bars will be inserted here -->
              </div>

              <!-- Timeline -->
              <div id="ganttTimeline" class="flex w-full"></div>
            </div>
          </div>
        </div>
        <!-- Statistics -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <!-- Turnaround & Waiting Time -->
          <div
            class="p-6 md:col-span-2 rounded-lg shadow-lg bg-white/80 backdrop-blur border border-gray-200"
            id="statsCard"
          >
            <h2 class="text-2xl font-semibold mb-4 text-gray-800">Output</h2>
            <table class="w-full">
              <thead>
                <tr class="border-b border-gray-200">
                  <th class="py-2 px-4 text-left text-gray-700">Job ID</th>
                  <th class="py-2 px-4 text-left text-gray-700">
                    Turn Around Time
                  </th>
                  <th class="py-2 px-4 text-left text-gray-700">
                    Waiting Time
                  </th>
                </tr>
              </thead>
              <tbody id="statsTableBody">
                <!-- Statistics will be inserted here -->
              </tbody>
            </table>
          </div>

          <!-- CPU Utilization -->
          <div
            class="p-6 rounded-lg shadow-lg bg-white/80 backdrop-blur border border-gray-200"
            id="cpuCard"
          >
            <h2 class="text-2xl font-semibold mb-4 text-gray-800">
              CPU Utilization
            </h2>
            <div class="flex flex-col items-center justify-center h-40">
              <div class="relative w-32 h-32">
                <svg class="transform -rotate-90 w-32 h-32">
                  <circle
                    cx="64"
                    cy="64"
                    r="56"
                    stroke="#e5e7eb"
                    stroke-width="12"
                    fill="none"
                    id="cpuCircleBase"
                  />
                  <circle
                    cx="64"
                    cy="64"
                    r="56"
                    stroke="url(#gradient)"
                    stroke-width="12"
                    fill="none"
                    stroke-dasharray="351.858"
                    stroke-dashoffset="351.858"
                    stroke-linecap="round"
                    id="cpuCircleProgress"
                  />
                  <defs>
                    <linearGradient
                      id="gradient"
                      x1="0%"
                      y1="0%"
                      x2="100%"
                      y2="100%"
                    >
                      <stop offset="0%" stop-color="#4ade80" />
                      <!-- green -->
                      <stop offset="100%" stop-color="#3b82f6" />
                      <!-- blue -->
                    </linearGradient>
                  </defs>
                </svg>
                <div class="absolute inset-0 flex items-center justify-center">
                  <span
                    class="text-2xl font-bold text-gray-800"
                    id="cpuPercentage"
                    >0%</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="scheduler.js"></script>
  </body>
</html>
